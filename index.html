function getTitle(lv,lang){
  var idx=0;
  for(var i=0;i<TITLE_LEVELS.length;i++){if(lv>=TITLE_LEVELS[i])idx=i;}
  return lang==="en"?TITLES_EN[idx]:TITLES_KO[idx];
}
function gradeFromXP(xp){var g="F";for(var i=0;i<GRADES.length;i++){if(xp>=GRADE_XP[GRADES[i]])g=GRADES[i];}return g;}
function gradeProgress(xp){var g=gradeFromXP(xp);return Math.min(((xp-GRADE_XP[g])/(NEXT_XP[g]-GRADE_XP[g]))*100,100);}
function gradeColor(g){return{F:"#ef4444",D:"#888888",C:"#86efac",B:"#4ade80",A:"#22c55e",S:"#fbbf24",SS:"#fcd34d",SSS:"#fff"}[g]||"#888888";}
function daysUntil(d){if(!d)return null;return Math.ceil((new Date(d)-new Date())/86400000);}
function todayStr(){
  var d=new Date();
  d.setHours(d.getHours()+9);
  return d.toISOString().split("T")[0];
}
function initStatXP(){var o={};STATS.forEach(function(s){o[s.id]=GRADE_XP[s.startGrade];});return o;}
function defaultState(){return{statXP:initStatXP(),totalXP:0,streak:0,totalDays:0,lastCheckinDate:null,todayHabits:{},log:[],weightLog:[{date:todayStr(),weight:W.current}],researchLog:[],projects:DEFAULT_PROJECTS,settings:{dDayShort:{label:"단기목표",date:"2026-09-01"},dDayLong:{label:"최종목표",date:"2027-03-01"}}};}
function loadLocal(){
  try{
    var r=localStorage.getItem("levelup_v4");
    if(r){
      var parsed=JSON.parse(r);
      // 구 스탯 키 마이그레이션: methodology→research, external+network→activity
      if(parsed.statXP){
        var sx=parsed.statXP;
        if(sx.methodology!==undefined){sx.research=(sx.research||0)+sx.methodology;delete sx.methodology;}
        if(sx.external!==undefined){sx.activity=(sx.activity||0)+sx.external;delete sx.external;}
        if(sx.network!==undefined){sx.activity=(sx.activity||0)+sx.network;delete sx.network;}
        if(sx.finance===undefined){sx.finance=0;}
      }
      return Object.assign({},defaultState(),parsed);
    }
  }catch(e){}
  return defaultState();
}
function saveLocal(s){try{localStorage.setItem("levelup_v4",JSON.stringify(s));}catch(e){}}
function loadLang(){try{return localStorage.getItem("levelup_lang")||"en";}catch(e){return"en";}}
function saveLang(l){try{localStorage.setItem("levelup_lang",l);}catch(e){}}

function Btn(props){
  return React.createElement("button",{onClick:props.onClick,disabled:props.disabled,style:Object.assign({cursor:props.disabled?"not-allowed":"pointer",fontFamily:"'Noto Sans KR',sans-serif"},props.style)},props.children);
}
function Inp(props){
  return React.createElement("input",{value:props.value,onChange:props.onChange,placeholder:props.placeholder,type:props.type||"text",style:Object.assign({background:"#111a11",border:"1px solid #4ade8044",borderRadius:8,padding:"9px 12px",color:"#f0f0f0",fontFamily:"'Noto Sans KR',sans-serif",fontSize:"0.88rem",width:"100%",outline:"none"},props.style)});
}

function App(){
  const [state,setState]=useState(loadLocal);
  const [lang,setLang]=useState(loadLang);
  const [tab,setTab]=useState("main");
  const [notif,setNotif]=useState(null);
  const [particles,setParticles]=useState([]);
  const [syncStatus,setSyncStatus]=useState("idle");
  const [showCheckin,setShowCheckin]=useState(false);
  const [showPaper,setShowPaper]=useState(false);
  const [paperForm,setPaperForm]=useState({type:"",title:"",journal:"",role:"1저자",projectId:""});
  const [showProject,setShowProject]=useState(false);
  const [editingPrj,setEditingPrj]=useState(null);
  const [prjForm,setPrjForm]=useState({title:"",sub:"",journal:"",status:"작성중",progress:0,deadline:"",notes:""});
  const [weightInput,setWeightInput]=useState("");
  const [showWeight,setShowWeight]=useState(false);
  const [settingsForm,setSettingsForm]=useState(null);

  const L=LANG[lang];
  const PROJECT_STATUS=lang==="en"?PROJECT_STATUS_EN:PROJECT_STATUS_KO;

  function toggleLang(){
    var nl=lang==="ko"?"en":"ko";
    setLang(nl);saveLang(nl);
  }

  useEffect(function(){saveLocal(state);},[state]);
  useEffect(function(){
  var now=new Date();
  var msUntilMidnight=(new Date(now.getFullYear(),now.getMonth(),now.getDate()+1)-now);
  var t=setTimeout(function(){window.location.reload();},msUntilMidnight);
  return function(){clearTimeout(t);};
},[]);

  useEffect(function(){
    setSyncStatus("syncing");
    fetch(SHEET_URL+"?action=load")
      .then(function(r){return r.json();})
      .then(function(data){
        if(data&&data.totalXP!==undefined&&data.status!=="empty"){
          setState(Object.assign({},defaultState(),data));
        }
        setSyncStatus("ok");
      }).catch(function(){setSyncStatus("error");});
  },[]);

  useEffect(function(){
    if(syncStatus==="syncing")return;
    var t=setTimeout(function(){
      setSyncStatus("syncing");
      var url=SHEET_URL+"?action=save&data="+encodeURIComponent(JSON.stringify(state));
      fetch(url)
        .then(function(r){return r.json();})
        .then(function(){setSyncStatus("ok");})
        .catch(function(){setSyncStatus("error");});
    },1500);
    return function(){clearTimeout(t);};
  },[state]);

  const today=todayStr();
  const todayHabits=state.todayHabits&&state.todayHabits.date===today?state.todayHabits.checked:{};
  const level=Math.floor(state.totalXP/200)+1;
  const wArr=state.weightLog||[];
  const latestW=wArr.length>0?wArr[wArr.length-1].weight:W.current;
  const settings=state.settings||{dDayShort:{label:"단기목표",date:"2026-09-01"},dDayLong:{label:"최종목표",date:"2027-03-01"}};

  function notify(msg,color){setNotif({msg:msg,color:color||C.mok});setTimeout(function(){setNotif(null);},3000);}
  function spark(){
    setParticles(Array.from({length:10},function(_,i){return{id:Date.now()+i,x:20+Math.random()*60,delay:Math.random()*0.4};}));
    setTimeout(function(){setParticles([]);},2000);
  }

  function toggleHabit(hid){
    var h=DAILY_HABITS.find(function(x){return x.id===hid;});
    if(!h)return;
    setState(function(prev){
      var prevHabits=prev.todayHabits&&prev.todayHabits.date===today?prev.todayHabits.checked:{};
      var wasChecked=!!prevHabits[hid];
      var newChecked=Object.assign({},prevHabits);
      var xpDiff={};
      if(wasChecked){delete newChecked[hid];Object.entries(h.xp).forEach(function(kv){xpDiff[kv[0]]=-kv[1];});}
      else{newChecked[hid]=true;Object.entries(h.xp).forEach(function(kv){xpDiff[kv[0]]=kv[1];});}
      var nx=Object.assign({},prev.statXP);
      Object.entries(xpDiff).forEach(function(kv){nx[kv[0]]=(nx[kv[0]]||0)+kv[1];});
      var totalDiff=Object.values(xpDiff).reduce(function(a,b){return a+b;},0);
      var checkedCount=Object.keys(newChecked).length;
      var yest=new Date(Date.now()-86400000).toISOString().split("T")[0];
      var isNewDay=prev.lastCheckinDate!==today;
      return Object.assign({},prev,{
        statXP:nx,totalXP:prev.totalXP+totalDiff,
        todayHabits:{date:today,checked:newChecked},
        lastCheckinDate:today,
        streak:isNewDay?(prev.lastCheckinDate===yest?prev.streak+1:1):prev.streak,
        totalDays:isNewDay?prev.totalDays+1:prev.totalDays,
        log:(function(){
  var newEntry={date:today,type:"checkin",habits:checkedCount,xp:totalDiff,icon:"✅"};
  var filtered=prev.log.filter(function(e){return!(e.type==="checkin"&&e.date===today);});
  return [newEntry].concat(filtered.slice(0,99));
})(),
      });
    });
    if(!todayHabits[hid])spark();
  }

  function doEvent(ev){
    var total=Object.values(ev.xp).reduce(function(a,b){return a+b;},0);
    var label=lang==="en"?ev.labelEn:ev.labelKo;
    setState(function(prev){
      var nx=Object.assign({},prev.statXP);
      Object.entries(ev.xp).forEach(function(kv){nx[kv[0]]=(nx[kv[0]]||0)+kv[1];});
      return Object.assign({},prev,{statXP:nx,totalXP:prev.totalXP+total,
        log:[{date:today,type:"event",label:label,icon:ev.icon,xp:total}].concat(prev.log.slice(0,99))});
    });
    spark();notify(ev.icon+" "+label+" +"+total+" XP!",C.to);
  }

  function submitPaper(){
    var rt=RESEARCH_TYPES.find(function(r){return r.id===paperForm.type;});
    if(!rt||!paperForm.title)return;
    var roles=L.paperRoles;
    var bonus=paperForm.role===roles[0]?1:paperForm.role===roles[1]?0.9:0.5;
    var xp=Math.round(rt.xp*bonus);
    var typeLabel=lang==="en"?rt.labelEn:rt.labelKo;
    var entry={id:Date.now(),date:today,typeId:rt.id,typeLabel:typeLabel,icon:rt.icon,title:paperForm.title,journal:paperForm.journal,role:paperForm.role,projectId:paperForm.projectId,xp:xp};
    setState(function(prev){
      var nx=Object.assign({},prev.statXP,{research:(prev.statXP.research||0)+xp});
      var nprj=prev.projects.map(function(p){return p.id===paperForm.projectId?Object.assign({},p,{papers:(p.papers||[]).concat([entry])}):p;});
      return Object.assign({},prev,{statXP:nx,totalXP:prev.totalXP+xp,researchLog:[entry].concat(prev.researchLog||[]),projects:nprj,
        log:[{date:today,type:"research",label:rt.icon+" "+typeLabel,icon:rt.icon,xp:xp}].concat(prev.log.slice(0,99))});
    });
    spark();notify(rt.icon+" "+typeLabel+" +"+xp+" XP!",C.mok);
    setShowPaper(false);setPaperForm({type:"",title:"",journal:"",role:L.paperRoles[0],projectId:""});
  }

  function savePrj(){
    if(!prjForm.title)return;
    setState(function(prev){
      if(editingPrj){return Object.assign({},prev,{projects:prev.projects.map(function(p){return p.id===editingPrj?Object.assign({},p,prjForm):p;})});}
      return Object.assign({},prev,{projects:prev.projects.concat([Object.assign({},prjForm,{id:String(Date.now()),papers:[]})])});
    });
    notify(editingPrj?(lang==="en"?"Updated!":"수정 완료"):(lang==="en"?"Project Added!":"프로젝트 추가!"),C.mok);
    setShowProject(false);setEditingPrj(null);setPrjForm({title:"",sub:"",journal:"",status:PROJECT_STATUS[0],progress:0,deadline:"",notes:""});
  }

  function logWeight(){
    var w=parseFloat(weightInput);
    if(isNaN(w)||w<30||w>150)return;
    setState(function(prev){return Object.assign({},prev,{
      weightLog:(prev.weightLog||[]).concat([{date:today,weight:w}]).slice(-60),
      log:[{date:today,type:"weight",weight:w,icon:"⚖️",xp:0}].concat(prev.log.slice(0,99)),
    });});
    notify((lang==="en"?"Weight logged: ":"체중 기록: ")+w+"kg",C.mok3);
    setWeightInput("");setShowWeight(false);
  }

  function wZone(w){
    if(w>W.z1)return{label:L.wZones[0],color:C.hwa,emoji:"🔴"};
    if(w>W.z2)return{label:L.wZones[1],color:C.to,emoji:"🟡"};
    if(w>W.z3)return{label:L.wZones[2],color:C.mok3,emoji:"🟢"};
    return{label:L.wZones[3],color:C.mok,emoji:"⭐"};
  }
  var zone=wZone(latestW);
  var dds=daysUntil(settings.dDayShort.date);
  var ddl=daysUntil(settings.dDayLong.date);

  var TABS=[
    {id:"main",icon:"📊",label:L.tabs[0]},
    {id:"research",icon:"📚",label:L.tabs[1]},
    {id:"events",icon:"📌",label:L.tabs[2]},
    {id:"body",icon:"💎",label:L.tabs[3]},
    {id:"settings",icon:"⚙️",label:L.tabs[4]},
    {id:"log",icon:"📋",label:L.tabs[5]},
  ];

  var S={
    root:{minHeight:"100vh",background:C.su,fontFamily:"'Noto Sans KR',sans-serif",color:C.geum,position:"relative",overflowX:"hidden"},
    bg:{position:"fixed",inset:0,background:"radial-gradient(ellipse at 25% 0%,"+C.mok+"09,"+C.su+" 55%)",zIndex:0},
    grid:{position:"fixed",inset:0,zIndex:0,backgroundImage:"linear-gradient("+C.mok+"09 1px,transparent 1px),linear-gradient(90deg,"+C.mok+"09 1px,transparent 1px)",backgroundSize:"36px 36px"},
    wrap:{position:"relative",zIndex:1,maxWidth:600,margin:"0 auto",padding:"18px 14px 100px"},
    header:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16,borderBottom:"1px solid "+C.mok+"1a",paddingBottom:14},

    lv:{fontFamily:"'Share Tech Mono',monospace",background:"linear-gradient(135deg,"+C.mok2+","+C.mok3+")",color:C.su,padding:"3px 12px",borderRadius:20,fontSize:"0.85rem",fontWeight:900,animation:"glow 2.5s infinite"},
    ddRow:{display:"flex",gap:7,marginBottom:16},
    ddBox:{flex:1,background:C.su2,border:"1px solid "+C.mok+"1a",borderRadius:10,padding:"9px 6px",display:"flex",flexDirection:"column",alignItems:"center",gap:2},
    tabs:{display:"flex",gap:3,marginBottom:16},
    tab:{flex:1,padding:"7px 2px",background:C.su2,border:"1px solid "+C.mok+"1a",borderRadius:8,color:C.geum3,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2},
    tabOn:{background:C.mok+"1a",borderColor:C.mok,color:C.mok},
    card:{background:C.su2,border:"1px solid",borderRadius:12,padding:14},

    evBtn:{display:"flex",alignItems:"center",gap:10,background:C.su2,border:"1px solid "+C.mok+"1a",borderRadius:10,padding:"11px 13px",color:C.geum,width:"100%",marginBottom:8},
    fixBtn:{position:"fixed",bottom:22,left:"50%",transform:"translateX(-50%)",background:"linear-gradient(135deg,"+C.mok2+","+C.mok3+")",border:"none",borderRadius:30,padding:"14px 42px",color:C.su,fontWeight:900,fontSize:"0.92rem",cursor:"pointer",boxShadow:"0 0 22px "+C.mok+"44",zIndex:50,whiteSpace:"nowrap"},
    overlay:{position:"fixed",inset:0,background:"#000000e0",zIndex:998,display:"flex",alignItems:"flex-end"},
    modal:{width:"100%",maxWidth:600,margin:"0 auto",background:C.su2,borderRadius:"20px 20px 0 0",padding:"22px 18px 38px",border:"1px solid "+C.mok+"2a",maxHeight:"88vh",overflowY:"auto"},
    mTitle:{fontFamily:"'Share Tech Mono',monospace",fontWeight:900,fontSize:"1rem",color:C.mok,marginBottom:14,textAlign:"center"},
    hItem:{display:"flex",alignItems:"center",gap:10,padding:"10px 13px",borderRadius:10,border:"1px solid",cursor:"pointer",marginBottom:6},
    sBadge:{fontSize:"0.68rem",fontWeight:700,padding:"2px 8px",borderRadius:5,border:"1px solid"},
    mTag:{fontSize:"0.68rem",color:C.geum2,background:C.su3,padding:"2px 7px",borderRadius:4},
    sRow:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid "+C.mok+"11",fontSize:"0.82rem"},
    langBtn:{background:"transparent",border:"1px solid "+C.mok+"55",borderRadius:20,padding:"3px 10px",color:C.mok,fontSize:"0.7rem",cursor:"pointer",fontFamily:"'Share Tech Mono',monospace"},
  };

  return (
    <div style={S.root}>
      <div style={S.bg}/><div style={S.grid}/>
      {particles.map(function(p){return <div key={p.id} style={{position:"fixed",bottom:"30%",left:p.x+"%",width:7,height:7,borderRadius:"50%",background:C.mok,animation:"particleUp 1.4s ease-out forwards",animationDelay:p.delay+"s",zIndex:300}}/> ;})}
      {notif&&<div style={{position:"fixed",top:14,left:"50%",transform:"translateX(-50%)",background:C.su2,border:"1px solid "+notif.color,padding:"9px 20px",borderRadius:8,fontWeight:700,zIndex:200,animation:"fadeIn 0.3s ease",fontFamily:"'Share Tech Mono',monospace",fontSize:"0.82rem",whiteSpace:"nowrap",color:notif.color}}>{notif.msg}</div>}

      <div style={S.wrap}>
        {/* 헤더 */}
        <div style={S.header}>
          <div>
            <div style={S.name}>{L.name}</div>

          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <button onClick={toggleLang} style={S.langBtn}>{L.langBtn}</button>
              <div style={S.lv}>Lv.{level}</div>
            </div>
            <div style={{fontSize:"0.75rem",color:C.to}}>🔥 {state.streak}{L.streak}</div>
            <div style={{fontSize:"0.6rem",color:syncStatus==="ok"?C.mok:syncStatus==="syncing"?C.to:C.hwa}}>
              {L.sync[syncStatus]||L.sync.error}
            </div>
          </div>
        </div>

        {/* D-Day */}
        <div style={S.ddRow}>
          {[
            {label:settings.dDayShort.label,val:"D-"+dds,color:C.to,sub:settings.dDayShort.date},
            {label:settings.dDayLong.label, val:"D-"+ddl,color:C.hwa,sub:settings.dDayLong.date},
            {label:L.totalXP,val:state.totalXP.toLocaleString(),color:C.mok,sub:state.totalDays+L.totalDays},
          ].map(function(d){return(
            <div key={d.label} style={S.ddBox}>
              <span style={{fontSize:"0.58rem",color:C.geum3,fontFamily:"'Share Tech Mono',monospace"}}>{d.label}</span>
              <span style={{fontFamily:"'Share Tech Mono',monospace",fontWeight:900,fontSize:d.label===L.totalXP?"0.9rem":"1.15rem",color:d.color}}>{d.val}</span>
              <span style={{fontSize:"0.55rem",color:C.geum3}}>{d.sub}</span>
            </div>
          );})}
        </div>

        {/* 탭 */}
        <div style={S.tabs}>
          {TABS.map(function(t){return(
            <button key={t.id} style={Object.assign({},S.tab,tab===t.id?S.tabOn:{})} onClick={function(){setTab(t.id);}}>
              <span style={{fontSize:"0.85rem"}}>{t.icon}</span>
              <span style={{fontSize:"0.6rem"}}>{t.label}</span>
            </button>
          );})}
        </div>

        {/* 스탯 */}
        {tab==="main"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
          {STATS.map(function(stat){
            var xp=state.statXP[stat.id]||0,g=gradeFromXP(xp),pct=gradeProgress(xp),gc=gradeColor(g);
            var statLabel=lang==="en"?stat.labelEn:stat.labelKo;
            var statSub=lang==="en"?stat.subEn:stat.subKo;
            var tabLabel=L.tabLabels[stat.tab]||stat.tab;
            return(
              <div key={stat.id}
                onClick={function(){setTab(stat.tab);}}
                onMouseEnter={function(e){e.currentTarget.style.borderColor=stat.color+"99";e.currentTarget.style.background=C.su3;}}
                onMouseLeave={function(e){e.currentTarget.style.borderColor=stat.color+"44";e.currentTarget.style.background=C.su2;}}
                style={Object.assign({},S.card,{borderColor:stat.color+"44",cursor:"pointer",transition:"border-color 0.2s,background 0.2s"})}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                  <span style={{fontSize:"1.3rem"}}>{stat.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:"0.92rem",color:C.geum}}>{statLabel}</div>
                    <div style={{fontSize:"0.65rem",color:C.geum3,marginTop:1}}>{statSub}</div>
                  </div>
                  <div style={Object.assign({},S.grade,{color:gc,borderColor:gc})}>{g}</div>
                  <span style={{fontSize:"0.6rem",color:stat.color,fontFamily:"monospace",opacity:0.7}}>{"→ "+tabLabel}</span>
                </div>
                <div style={S.bar}><div style={Object.assign({},S.fill,{width:pct+"%",background:"linear-gradient(90deg,"+stat.color+"77,"+stat.color+")"})}/></div>
                <div style={{fontSize:"0.6rem",color:C.geum3,marginTop:4,fontFamily:"monospace"}}>{xp.toLocaleString()} / {NEXT_XP[g].toLocaleString()} XP</div>
              </div>
            );
          })}
        </div>}

        {/* 연구 */}
        {tab==="research"&&<div>
          <Btn onClick={function(){setEditingPrj(null);setPrjForm({title:"",sub:"",journal:"",status:PROJECT_STATUS[0],progress:0,deadline:"",notes:""});setShowProject(true);}} style={Object.assign({},S.outline,{marginBottom:8})}>{L.newProject}</Btn>
          <Btn onClick={function(){setShowPaper(true);}} style={Object.assign({},S.outline,{borderColor:C.to+"88",color:C.to,marginBottom:16})}>{L.newPaper}</Btn>

          {(state.projects||[]).map(function(p){
            var dd=daysUntil(p.deadline),sc=STATUS_COLOR[p.status]||C.geum2,pc=(p.papers||[]).length;
            return(
              <div key={p.id} style={Object.assign({},S.card,{borderColor:sc+"44",marginBottom:12})}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,color:C.geum,fontSize:"0.95rem"}}>{p.title}</div>
                    {p.sub&&<div style={{fontSize:"0.68rem",color:C.geum3,marginTop:1}}>{p.sub}</div>}
                  </div>
                  <div style={Object.assign({},S.sBadge,{background:sc+"22",color:sc,borderColor:sc+"66"})}>{p.status}</div>
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
                  {p.journal&&<span style={S.mTag}>🎯 {p.journal}</span>}
                  {dd!==null&&<span style={Object.assign({},S.mTag,{color:dd<7?C.hwa:dd<30?C.to:C.geum2})}>{dd>=0?"D-"+dd:(lang==="en"?"Overdue":"기한초과")}</span>}
                  {pc>0&&<span style={Object.assign({},S.mTag,{color:C.mok})}>📄 {pc}</span>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  <div style={Object.assign({},S.bar,{flex:1})}><div style={Object.assign({},S.fill,{width:(p.progress||0)+"%",background:"linear-gradient(90deg,"+sc+"77,"+sc+")"})}/></div>
                  <span style={{fontSize:"0.72rem",color:sc,fontFamily:"monospace",minWidth:32}}>{p.progress||0}%</span>
                </div>
                {p.notes&&<div style={{fontSize:"0.68rem",color:C.geum3,marginBottom:8,fontStyle:"italic"}}>💬 {p.notes}</div>}
                <div style={{display:"flex",gap:6,marginTop:8}}>
                  <Btn onClick={function(){setEditingPrj(p.id);setPrjForm({title:p.title,sub:p.sub||"",journal:p.journal||"",status:p.status||PROJECT_STATUS[0],progress:p.progress||0,deadline:p.deadline||"",notes:p.notes||""});setShowProject(true);}} style={{flex:1,padding:"6px 0",background:"transparent",border:"1px solid "+C.mok+"55",borderRadius:7,fontSize:"0.75rem",color:C.mok}}>{L.edit}</Btn>
                  <Btn onClick={function(){setState(function(prev){return Object.assign({},prev,{projects:prev.projects.filter(function(x){return x.id!==p.id;})});});notify(lang==="en"?"Deleted":"삭제",C.hwa);}} style={{padding:"6px 12px",background:"transparent",border:"1px solid "+C.hwa+"55",borderRadius:7,fontSize:"0.75rem",color:C.hwa}}>{L.del}</Btn>
                </div>
              </div>
            );
          })}

          {(state.researchLog||[]).length>0&&<div>
            <div style={{fontWeight:700,color:C.mok,fontSize:"0.85rem",margin:"12px 0 8px"}}>{L.paperList}</div>
            {(state.researchLog||[]).map(function(r,i){return(
              <div key={i} style={S.logRow}>
                <span>{r.icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:"0.8rem",color:C.geum}}>{r.title}</div>
                  <div style={{fontSize:"0.65rem",color:C.geum3}}>{r.typeLabel} · {r.role} · {r.date}</div>
                </div>
                <span style={{fontSize:"0.7rem",color:C.mok,fontFamily:"monospace"}}>+{r.xp}</span>
              </div>
            );})}
          </div>}
        </div>}

        {/* 실적 */}
        {tab==="events"&&<div>
          <div style={{fontWeight:700,color:C.mok,fontSize:"0.85rem",marginBottom:10}}>{L.eventsTitle}</div>
          {EVENTS.map(function(ev){
            var evLabel=lang==="en"?ev.labelEn:ev.labelKo;
            return(
              <Btn key={ev.id} onClick={function(){doEvent(ev);}} style={S.evBtn}>
                <span style={{fontSize:"1.1rem"}}>{ev.icon}</span>
                <span style={{flex:1,textAlign:"left",fontSize:"0.88rem"}}>{evLabel}</span>
                <span style={{color:C.to,fontFamily:"monospace",fontSize:"0.72rem"}}>+{Object.values(ev.xp).reduce(function(a,b){return a+b;},0)} XP</span>
              </Btn>
            );
          })}
        </div>}

        {/* 체중 */}
        {tab==="body"&&<div>
          <div style={{fontWeight:700,color:C.mok,fontSize:"0.85rem",marginBottom:10}}>{L.bodyTitle}</div>
          <div style={Object.assign({},S.card,{borderColor:zone.color+"66",marginBottom:12})}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <span style={{fontSize:"2.2rem"}}>{zone.emoji}</span>
              <div>
                <div style={{fontFamily:"monospace",fontSize:"1.8rem",color:zone.color,fontWeight:900,lineHeight:1}}>{latestW}kg</div>
                <div style={{color:zone.color,fontSize:"0.78rem",marginTop:3}}>{zone.label}</div>
              </div>

          </div>
          {[
            {label:L.bodyZones[0],formula:"167-110",target:W.z1,color:C.to},

            {label:L.bodyZones[2],formula:"167-120",target:W.z3,color:C.mok},
          ].map(function(st){
            var done=latestW<=st.target;
            var pct=done?100:Math.max(0,((W.current-latestW)/(W.current-st.target))*100);
            return(
              <div key={st.label} style={Object.assign({},S.card,{borderColor:st.color+(done?"":"33"),marginBottom:8})}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
                  <div>
                    <div style={{fontSize:"0.82rem",fontWeight:700,color:st.color}}>{st.label}</div>

              <Inp value={weightInput} onChange={function(e){setWeightInput(e.target.value);}} placeholder={L.bodyPlaceholder} type="number" style={{flex:1}}/>
              <Btn onClick={logWeight} style={Object.assign({},S.solid,{padding:"9px 14px",width:"auto"})}>{L.bodyBtn}</Btn>
              <Btn onClick={function(){setShowWeight(false);}} style={{padding:"9px 14px",background:"#333",border:"none",borderRadius:8,color:C.geum,cursor:"pointer"}}>{L.bodyCancel}</Btn>
            </div>
          ):(
            <Btn onClick={function(){setShowWeight(true);}} style={Object.assign({},S.outline,{marginTop:10})}>{L.bodyRecord}</Btn>
          )}
          {wArr.length>1&&<div style={{marginTop:12}}>
            <div style={{fontWeight:700,color:C.mok,fontSize:"0.85rem",marginBottom:8}}>{L.bodyRecent}</div>
            {wArr.slice().reverse().slice(0,7).map(function(w,i,arr){
              var prev=arr[i+1],diff=prev?(w.weight-prev.weight).toFixed(1):null;
              return(
                <div key={i} style={S.logRow}>
                  <span style={S.logDate}>{w.date}</span>
                  <span style={{color:C.geum}}>{w.weight}kg</span>
                  {diff!==null&&<span style={{color:parseFloat(diff)<0?C.mok:C.hwa,fontSize:"0.75rem"}}>{parseFloat(diff)>0?"+":""}{diff}kg</span>}
                </div>
              );
            })}
          </div>}
        </div>}

        {/* 설정 */}
        {tab==="settings"&&<div>
          <div style={{fontWeight:700,color:C.mok,fontSize:"0.85rem",marginBottom:10}}>{L.settingsTitle}</div>
          {!settingsForm?(
            <div>
              <div style={S.card}>
                <div style={S.sRow}><span style={{color:C.geum2}}>{settings.dDayShort.label}</span><span style={{color:C.to,fontFamily:"monospace"}}>{settings.dDayShort.date} (D-{dds})</span></div>
                <div style={S.sRow}><span style={{color:C.geum2}}>{settings.dDayLong.label}</span><span style={{color:C.hwa,fontFamily:"monospace"}}>{settings.dDayLong.date} (D-{ddl})</span></div>
              </div>
              <Btn onClick={function(){setSettingsForm(JSON.parse(JSON.stringify(settings)));}} style={Object.assign({},S.outline,{marginTop:8})}>{L.settingsEdit}</Btn>
            </div>
          ):(
            <div style={S.card}>
              {[
                {lbl:lang==="en"?"Short-term Name":"단기목표 이름",k:"short",f:"label"},
                {lbl:lang==="en"?"Short-term Date":"단기목표 날짜",k:"short",f:"date",type:"date"},
                {lbl:lang==="en"?"Final Goal Name":"최종목표 이름",k:"long",f:"label"},
                {lbl:lang==="en"?"Final Goal Date":"최종목표 날짜",k:"long",f:"date",type:"date"},
              ].map(function(field){return(
                <div key={field.lbl} style={{marginBottom:12}}>
                  <div style={{fontSize:"0.75rem",color:C.mok,fontWeight:700,marginBottom:5}}>{field.lbl}</div>
                  <Inp type={field.type||"text"}
                    value={field.k==="short"?settingsForm.dDayShort[field.f]:settingsForm.dDayLong[field.f]}
                    onChange={function(e){
                      var v=e.target.value;
                      setSettingsForm(function(prev){
                        var copy=JSON.parse(JSON.stringify(prev));
                        if(field.k==="short")copy.dDayShort[field.f]=v;
                        else copy.dDayLong[field.f]=v;
                        return copy;
                      });
                    }}/>
                </div>
              );})}
              <div style={{display:"flex",gap:8}}>
                <Btn onClick={function(){setState(function(prev){return Object.assign({},prev,{settings:settingsForm});});notify(lang==="en"?"Saved!":"설정 저장!",C.mok);setSettingsForm(null);}} style={Object.assign({},S.solid,{flex:1})}>{L.settingsSave}</Btn>
                <Btn onClick={function(){setSettingsForm(null);}} style={{flex:1,padding:13,background:"#333",border:"none",borderRadius:12,color:C.geum,cursor:"pointer"}}>{L.settingsCancel}</Btn>
              </div>
            </div>
          )}

          <div style={{fontWeight:700,color:C.mok,fontSize:"0.85rem",margin:"16px 0 10px"}}>{L.statsTitle}</div>
          {STATS.map(function(s){
            var xp=state.statXP[s.id]||0,g=gradeFromXP(xp);
            var sLabel=lang==="en"?s.labelEn:s.labelKo;
            return(
              <div key={s.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:"1px solid "+C.mok+"11"}}>
                <span>{s.icon}</span>
                <span style={{flex:1,fontSize:"0.85rem"}}>{sLabel}</span>
                <span style={{fontFamily:"monospace",color:gradeColor(g),fontWeight:700}}>{g}</span>
                <span style={{fontSize:"0.7rem",color:C.geum3,fontFamily:"monospace"}}>{xp.toLocaleString()} XP</span>
              </div>
            );
          })}

          <div style={{marginTop:16}}>
            <Btn onClick={function(){if(window.confirm(L.resetConfirm)){localStorage.removeItem('levelup_v4');window.location.reload();}}} style={{width:"100%",padding:13,background:C.hwa+"22",border:"1px solid "+C.hwa+"44",borderRadius:12,color:C.hwa,cursor:"pointer",fontSize:"0.9rem"}}>{L.reset}</Btn>
          </div>
        </div>}

        {/* 로그 */}
        {tab==="log"&&<div>
          <div style={{fontWeight:700,color:C.mok,fontSize:"0.85rem",marginBottom:10}}>{L.logTitle}</div>
          {state.log.length===0&&<div style={{color:C.geum3,textAlign:"center",marginTop:30}}>{L.logEmpty}</div>}
          {state.log.map(function(e,i){return(
            <div key={i} style={S.logRow}>
              <span style={S.logDate}>{e.date}</span>
              <span style={{flex:1,color:C.geum,fontSize:"0.8rem"}}>
                {e.type==="checkin"?"✅ "+(lang==="en"?"Check-in ("+e.habits+" habits)":"체크인 ("+e.habits+"개 습관)"):e.type==="weight"?"⚖️ "+e.weight+"kg":(e.icon||"")+" "+(e.label||"")}
              </span>
              {e.xp>0&&<span style={{color:C.mok,fontFamily:"monospace",fontSize:"0.7rem"}}>+{e.xp} XP</span>}
            </div>
          );})}
        </div>}

        <div style={{height:100}}/>
      </div>

      {/* 체크인 버튼 */}
      <button onClick={function(){setShowCheckin(true);}} style={Object.assign({},S.fixBtn,{})}>
        ⚡ {L.checkinBtn} ({Object.keys(todayHabits).length}/{DAILY_HABITS.length})
      </button>

      {/* 체크인 모달 */}
      {showCheckin&&<div style={S.overlay} onClick={function(){setShowCheckin(false);}}>
        <div style={S.modal} onClick={function(e){e.stopPropagation();}}>
          <div style={S.mTitle}>{L.checkinTitle}</div>
          <div style={{fontSize:"0.75rem",color:C.geum3,textAlign:"center",marginBottom:12}}>{L.checkinSub}</div>
          {DAILY_HABITS.map(function(h){
            var on=!!todayHabits[h.id];
            var habitXP=Object.values(h.xp).reduce(function(a,b){return a+b;},0);
            var hLabel=lang==="en"?h.labelEn:h.labelKo;
            return(
              <div key={h.id} style={Object.assign({},S.hItem,{background:on?C.mok+"18":"transparent",borderColor:on?C.mok:"#2a3a2a"})}
                onClick={function(){toggleHabit(h.id);}}>
                <span style={{fontSize:"1.2rem"}}>{h.icon}</span>
                <span style={{flex:1,color:on?C.mok:C.geum,fontSize:"0.88rem"}}>{hLabel}</span>
                <span style={{color:C.mok3,fontFamily:"monospace",fontSize:"0.7rem",marginRight:8}}>+{habitXP}</span>
                <span style={{fontSize:"1.1rem"}}>{on?"✅":"⬜"}</span>
              </div>
            );
          })}
          <div style={{textAlign:"center",color:C.mok,fontWeight:700,margin:"14px 0 8px",fontFamily:"monospace"}}>
            {lang==="en"?Object.keys(todayHabits).length+"/"+DAILY_HABITS.length+L.checkinDone:("오늘 "+Object.keys(todayHabits).length+"/"+DAILY_HABITS.length+L.checkinDone)}
          </div>
          <Btn onClick={function(){setShowCheckin(false);}} style={S.solid}>{L.checkinClose}</Btn>
        </div>
      </div>}

      {/* 논문 모달 */}
      {showPaper&&<div style={S.overlay} onClick={function(){setShowPaper(false);}}>
        <div style={S.modal} onClick={function(e){e.stopPropagation();}}>
          <div style={S.mTitle}>{L.paperTitle}</div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:"0.75rem",color:C.mok,fontWeight:700,marginBottom:5}}>{L.paperType}</div>
            <div style={{maxHeight:200,overflowY:"auto",display:"flex",flexDirection:"column",gap:5}}>
              {RESEARCH_TYPES.map(function(rt){
                var on=paperForm.type===rt.id;
                var rtLabel=lang==="en"?rt.labelEn:rt.labelKo;
                return(
                  <div key={rt.id} style={Object.assign({},S.hItem,{background:on?C.mok+"18":"transparent",borderColor:on?C.mok:"#2a3a2a"})}
                    onClick={function(){setPaperForm(function(p){return Object.assign({},p,{type:rt.id});});}}>
                    <span>{rt.icon}</span>
                    <span style={{flex:1,color:C.geum,fontSize:"0.82rem"}}>{rtLabel}</span>
                    <span style={{color:rt.xp>=1000?C.to:C.mok,fontSize:"0.7rem",fontFamily:"monospace"}}>+{rt.xp}</span>
                  </div>
                );
              })}
            </div>
          </div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:"0.75rem",color:C.mok,fontWeight:700,marginBottom:5}}>{L.paperName}</div>
            <Inp value={paperForm.title} onChange={function(e){setPaperForm(function(p){return Object.assign({},p,{title:e.target.value});});}} placeholder={L.paperNamePh}/>
          </div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:"0.75rem",color:C.mok,fontWeight:700,marginBottom:5}}>{L.paperJournal}</div>
            <Inp value={paperForm.journal} onChange={function(e){setPaperForm(function(p){return Object.assign({},p,{journal:e.target.value});});}} placeholder={L.paperJournalPh}/>
          </div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:"0.75rem",color:C.mok,fontWeight:700,marginBottom:5}}>{L.paperProject}</div>
            <select value={paperForm.projectId} onChange={function(e){setPaperForm(function(p){return Object.assign({},p,{projectId:e.target.value});});}}
              style={{width:"100%",background:C.su2,border:"1px solid "+C.mok+"44",borderRadius:8,padding:"9px 12px",color:C.geum,fontSize:"0.88rem"}}>
              <option value="">{L.paperProjectNone}</option>
              {(state.projects||[]).map(function(p){return <option key={p.id} value={p.id}>{p.title}</option>;})}
            </select>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:"0.75rem",color:C.mok,fontWeight:700,marginBottom:5}}>{L.paperRole}</div>
            <div style={{display:"flex",gap:6}}>
              {L.paperRoles.map(function(r){
                var on=paperForm.role===r;
                return <Btn key={r} onClick={function(){setPaperForm(function(p){return Object.assign({},p,{role:r});});}}
                  style={{flex:1,padding:"8px 0",fontSize:"0.8rem",border:"1px solid "+(on?C.mok:"#2a3a2a"),background:on?C.mok+"22":"transparent",color:on?C.mok:C.geum2,borderRadius:8}}>{r}</Btn>;
              })}
            </div>
            <div style={{fontSize:"0.65rem",color:C.geum3,marginTop:4}}>{L.paperRoleNote}</div>
          </div>
          <Btn onClick={submitPaper} style={Object.assign({},S.solid,{opacity:paperForm.type&&paperForm.title?1:0.4})}>{L.paperSubmit}</Btn>
        </div>
      </div>}

      {/* 프로젝트 모달 */}
      {showProject&&<div style={S.overlay} onClick={function(){setShowProject(false);}}>
        <div style={S.modal} onClick={function(e){e.stopPropagation();}}>
          <div style={S.mTitle}>{editingPrj?L.prjEditTitle:L.prjNewTitle}</div>
          {[
            {lbl:L.prjTitle,key:"title",ph:L.prjTitlePh},
            {lbl:L.prjSub,key:"sub",ph:L.prjSubPh},
            {lbl:L.prjJournal,key:"journal",ph:L.prjJournalPh},
          ].map(function(f){return(
            <div key={f.key} style={{marginBottom:10}}>
              <div style={{fontSize:"0.75rem",color:C.mok,fontWeight:700,marginBottom:5}}>{f.lbl}</div>
              <Inp value={prjForm[f.key]} onChange={function(e){var v=e.target.value;setPrjForm(function(p){var n=Object.assign({},p);n[f.key]=v;return n;});}} placeholder={f.ph}/>
            </div>
          );})}
          <div style={{marginBottom:10}}>
            <div style={{fontSize:"0.75rem",color:C.mok,fontWeight:700,marginBottom:5}}>{L.prjStatus}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {PROJECT_STATUS.map(function(s){
                var on=prjForm.status===s,sc=STATUS_COLOR[s]||C.geum2;
                return <Btn key={s} onClick={function(){setPrjForm(function(p){return Object.assign({},p,{status:s});});}}
                  style={{padding:"5px 10px",fontSize:"0.75rem",border:"1px solid "+(on?sc:"#2a3a2a"),background:on?sc+"22":"transparent",color:on?sc:C.geum2,borderRadius:6}}>{s}</Btn>;
              })}
            </div>
          </div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:"0.75rem",color:C.mok,fontWeight:700,marginBottom:5}}>{L.prjProgress} ({prjForm.progress}%)</div>
            <input type="range" min="0" max="100" value={prjForm.progress}
              onChange={function(e){var v=parseInt(e.target.value);setPrjForm(function(p){return Object.assign({},p,{progress:v});});}}
              style={{width:"100%",accentColor:C.mok}}/>
          </div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:"0.75rem",color:C.mok,fontWeight:700,marginBottom:5}}>{L.prjDeadline}</div>
            <Inp type="date" value={prjForm.deadline} onChange={function(e){var v=e.target.value;setPrjForm(function(p){return Object.assign({},p,{deadline:v});});}}/>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:"0.75rem",color:C.mok,fontWeight:700,marginBottom:5}}>{L.prjNotes}</div>
            <Inp value={prjForm.notes} onChange={function(e){var v=e.target.value;setPrjForm(function(p){return Object.assign({},p,{notes:v});});}} placeholder={L.prjNotesPh}/>
          </div>
          <Btn onClick={savePrj} style={Object.assign({},S.solid,{opacity:prjForm.title?1:0.4})}>{editingPrj?L.prjSave:L.prjAdd}</Btn>
        </div>
      </div>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
