<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0a0f0a"/>
<title>LevelupRPG — 손지윤</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0f0a;overflow-x:hidden;}
input,select,button{font-family:'Noto Sans KR',sans-serif;outline:none;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#4ade8044;border-radius:2px;}
@keyframes particleUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-90px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px #4ade8044}50%{box-shadow:0 0 18px #4ade8077}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;

const C={
  su:"#0a0f0a",su2:"#111a11",su3:"#1a2a1a",
  mok:"#4ade80",mok2:"#22c55e",mok3:"#86efac",
  to:"#fbbf24",to2:"#fcd34d",
  geum:"#f0f0f0",geum2:"#888888",geum3:"#555555",
  hwa:"#ef4444",
};

const GRADES=["F","D","C","B","A","S","SS","SSS"];
const GRADE_XP={F:0,D:500,C:1500,B:3000,A:5500,S:9000,SS:14000,SSS:20000};
const NEXT_XP={F:500,D:1500,C:3000,B:5500,A:9000,S:14000,SS:20000,SSS:99999};

const STATS=[
  {id:"research",  icon:"⚔️",label:"연구실적", sub:"SSCI·SCIE·KCI",       color:C.mok, startGrade:"D"},
  {id:"methodology",icon:"🔬",label:"연구역량", sub:"방법론·자격증·빅데이터",color:C.mok3,startGrade:"C"},
  {id:"external",  icon:"🏛️",label:"대외실적", sub:"산학·해외연계·학회",    color:C.to,  startGrade:"F"},
  {id:"teaching",  icon:"🎓",label:"티칭",     sub:"강의평가·강의다양성",    color:C.geum,startGrade:"A"},
  {id:"presence",  icon:"💎",label:"프레젠스", sub:"외모·체력·자신감",       color:C.mok2,startGrade:"C"},
  {id:"network",   icon:"🤝",label:"네트워크", sub:"인맥·추천서·학회활동",   color:C.to2, startGrade:"D"},
];

const RESEARCH_TYPES=[
  {id:"ssci_q1",  label:"SSCI Q1",      icon:"🥇",xp:2000},
  {id:"ssci_q2",  label:"SSCI Q2",      icon:"🥈",xp:1500},
  {id:"ssci_q34", label:"SSCI Q3/Q4",   icon:"🥉",xp:1000},
  {id:"scie",     label:"SCIE",         icon:"📘",xp:800},
  {id:"scopus",   label:"Scopus",       icon:"📗",xp:500},
  {id:"kci_a",    label:"KCI 등재",      icon:"📄",xp:300},
  {id:"kci_b",    label:"KCI 후보",      icon:"📃",xp:150},
  {id:"proceeding",label:"학술대회",     icon:"🎤",xp:200},
  {id:"revision", label:"R&R/심사중",    icon:"⏳",xp:100},
  {id:"working",  label:"Working Paper",icon:"✍️",xp:50},
];

const PROJECT_STATUS=["구상중","작성중","투고완료","심사중","R&R","게재확정","게재완료"];
const STATUS_COLOR={
  "구상중":C.geum3,"작성중":C.to,"투고완료":C.mok3,
  "심사중":C.to2,"R&R":C.hwa,"게재확정":C.mok,"게재완료":C.mok2,
};

const DAILY_HABITS=[
  {id:"wake",    label:"6시 기상",          icon:"🌅",xp:{presence:15}},
  {id:"fast",    label:"8시 이후 금식",      icon:"🚫",xp:{presence:20}},
  {id:"water",   label:"물 2L 이상",         icon:"💧",xp:{presence:15}},
  {id:"sleep",   label:"11시 이전 취침",      icon:"🌙",xp:{presence:15}},
  {id:"meal",    label:"도시락/식사시간 준수",icon:"🍱",xp:{presence:10}},
  {id:"paper",   label:"논문 5페이지 읽기",   icon:"📄",xp:{research:30,methodology:10}},
  {id:"write",   label:"100단어 이상 쓰기",   icon:"✍️",xp:{research:40}},
  {id:"exercise",label:"운동",               icon:"🏃",xp:{presence:25}},
];

const EVENTS=[
  {id:"project",    label:"산학 프로젝트 수주",  icon:"💼",xp:{external:300}},
  {id:"certificate",label:"자격증 취득",          icon:"📜",xp:{methodology:400}},
  {id:"grooming",   label:"외모관리(왁싱/피부)",  icon:"💅",xp:{presence:50}},
  {id:"health",     label:"병원/건강검진",         icon:"🏥",xp:{presence:40}},
  {id:"application",label:"임용 지원서 제출",      icon:"📋",xp:{research:50,network:50}},
  {id:"interview",  label:"면접 참가",             icon:"🎯",xp:{network:200,teaching:100}},
  {id:"collab",     label:"해외 연구자 컨택",      icon:"🌐",xp:{external:150,network:100}},
  {id:"method",     label:"방법론 스터디",          icon:"📊",xp:{methodology:100}},
  {id:"overseas",   label:"해외학회 참가",          icon:"✈️",xp:{external:300,network:150}},
];

const W={current:61.7,z1:57,z2:52,z3:47};
const TITLES=[
  {minLevel:1,title:"시간강사"},{minLevel:5,title:"연구자 지망생"},
  {minLevel:10,title:"각성한 강사"},{minLevel:20,title:"임용 도전자"},
  {minLevel:30,title:"검증된 연구자"},{minLevel:50,title:"테뉴어 후보"},
];
const DEFAULT_PROJECTS=[
  {id:"dja",title:"DJA 논문",sub:"GenAI × 직업불안 PLS-SEM",journal:"IJPR",status:"투고완료",progress:80,deadline:"2026-06-04",notes:"KORMS 발표본 별도",papers:[]},
  {id:"dpm",title:"DPM 논문",sub:"디자인 관여도 × NPD성과",journal:"JMTM",status:"R&R",progress:40,deadline:"",notes:"이론적 기여 보강 필요",papers:[]},
];

const SHEET_URL="https://script.google.com/macros/s/AKfycbyVsN5jT-62obLU945JLKaGYxcLOzfp7DWPmHprPHakCBdD0AKySdgJhZbPiNwqAZ-M2A/exec";

function getTitle(lv){const t=[...TITLES].reverse().find(function(t){return lv>=t.minLevel;});return t?t.title:"시간강사";}
function gradeFromXP(xp){var g="F";for(var i=0;i<GRADES.length;i++){if(xp>=GRADE_XP[GRADES[i]])g=GRADES[i];}return g;}
function gradeProgress(xp){var g=gradeFromXP(xp);return Math.min(((xp-GRADE_XP[g])/(NEXT_XP[g]-GRADE_XP[g]))*100,100);}
function gradeColor(g){return{F:C.hwa,D:C.geum2,C:C.mok3,B:C.mok,A:C.mok2,S:C.to,SS:C.to2,SSS:"#fff"}[g]||C.geum2;}
function daysUntil(d){if(!d)return null;return Math.ceil((new Date(d)-new Date())/86400000);}
function todayStr(){return new Date().toISOString().split("T")[0];}
function initStatXP(){var o={};STATS.forEach(function(s){o[s.id]=GRADE_XP[s.startGrade];});return o;}
function defaultState(){return{statXP:initStatXP(),totalXP:0,streak:0,totalDays:0,lastCheckinDate:null,todayHabits:{},log:[],weightLog:[{date:todayStr(),weight:W.current}],researchLog:[],projects:DEFAULT_PROJECTS,settings:{dDayShort:{label:"단기목표",date:"2026-09-01"},dDayLong:{label:"최종목표",date:"2027-03-01"}}};}
function loadLocal(){try{var r=localStorage.getItem("levelup_v4");if(r)return Object.assign({},defaultState(),JSON.parse(r));}catch(e){}return defaultState();}
function saveLocal(s){try{localStorage.setItem("levelup_v4",JSON.stringify(s));}catch(e){}}

function Btn(props){
  return React.createElement("button",{onClick:props.onClick,disabled:props.disabled,style:Object.assign({cursor:props.disabled?"not-allowed":"pointer",fontFamily:"'Noto Sans KR',sans-serif"},props.style)},props.children);
}
function Inp(props){
  return React.createElement("input",{value:props.value,onChange:props.onChange,placeholder:props.placeholder,type:props.type||"text",style:Object.assign({background:C.su2,border:"1px solid "+C.mok+"44",borderRadius:8,padding:"9px 12px",color:C.geum,fontFamily:"'Noto Sans KR',sans-serif",fontSize:"0.88rem",width:"100%",outline:"none"},props.style)});
}

function App(){
  const [state,setState]=useState(loadLocal);
  const [tab,setTab]=useState("main");
  const [notif,setNotif]=useState(null);
  const [particles,setParticles]=useState([]);
  const [syncStatus,setSyncStatus]=useState("idle");
  const [showCheckin,setShowCheckin]=useState(false);
  const [showPaper,setShowPaper]=useState(false);
  const [paperForm,setPaperForm]=useState({type:"",title:"",journal:"",role:"1저자",projectId:""});
  const [showProject,setShowProject]=useState(false);
  const [editingPrj,setEditingPrj]=useState(null);
  const [prjForm,setPrjForm]=useState({title:"",sub:"",journal:"",status:"작성중",progress:0,deadline:"",notes:""});
  const [weightInput,setWeightInput]=useState("");
  const [showWeight,setShowWeight]=useState(false);
  const [settingsForm,setSettingsForm]=useState(null);

  useEffect(function(){saveLocal(state);},[state]);

  useEffect(function(){
    setSyncStatus("syncing");
    fetch(SHEET_URL).then(function(r){return r.json();}).then(function(data){
      if(data&&data.totalXP!==undefined&&data.status!=="empty"){
        setState(Object.assign({},defaultState(),data));
      }
      setSyncStatus("ok");
    }).catch(function(){setSyncStatus("error");});
  },[]);

  useEffect(function(){
    if(syncStatus==="syncing")return;
    var t=setTimeout(function(){
      setSyncStatus("syncing");
      fetch(SHEET_URL,{method:"POST",body:JSON.stringify(state),headers:{"Content-Type":"application/json"}})
        .then(function(r){return r.json();}).then(function(){setSyncStatus("ok");}).catch(function(){setSyncStatus("error");});
    },1500);
    return function(){clearTimeout(t);};
  },[state]);

  const today=todayStr();
  const todayHabits=state.todayHabits&&state.todayHabits.date===today?state.todayHabits.checked:{};
  const level=Math.floor(state.totalXP/200)+1;
  const wArr=state.weightLog||[];
  const latestW=wArr.length>0?wArr[wArr.length-1].weight:W.current;
  const settings=state.settings||{dDayShort:{label:"단기목표",date:"2026-09-01"},dDayLong:{label:"최종목표",date:"2027-03-01"}};

  function notify(msg,color){setNotif({msg:msg,color:color||C.mok});setTimeout(function(){setNotif(null);},3000);}
  function spark(){
    setParticles(Array.from({length:10},function(_,i){return{id:Date.now()+i,x:20+Math.random()*60,delay:Math.random()*0.4};},));
    setTimeout(function(){setParticles([]);},2000);
  }

  function toggleHabit(hid){
    var h=DAILY_HABITS.find(function(x){return x.id===hid;});
    if(!h)return;
    setState(function(prev){
      var prevHabits=prev.todayHabits&&prev.todayHabits.date===today?prev.todayHabits.checked:{};
      var wasChecked=!!prevHabits[hid];
      var newChecked=Object.assign({},prevHabits);
      var xpDiff={};
      if(wasChecked){
        delete newChecked[hid];
        Object.entries(h.xp).forEach(function(kv){xpDiff[kv[0]]=-kv[1];});
      } else {
        newChecked[hid]=true;
        Object.entries(h.xp).forEach(function(kv){xpDiff[kv[0]]=kv[1];});
      }
      var nx=Object.assign({},prev.statXP);
      Object.entries(xpDiff).forEach(function(kv){nx[kv[0]]=(nx[kv[0]]||0)+kv[1];});
      var totalDiff=Object.values(xpDiff).reduce(function(a,b){return a+b;},0);
      var checkedCount=Object.keys(newChecked).length;
      var isPerfect=checkedCount===DAILY_HABITS.length;
      var yest=new Date(Date.now()-86400000).toISOString().split("T")[0];
      var isNewDay=prev.lastCheckinDate!==today;
      return Object.assign({},prev,{
        statXP:nx,
        totalXP:prev.totalXP+totalDiff,
        todayHabits:{date:today,checked:newChecked},
        lastCheckinDate:today,
        streak:isNewDay?(prev.lastCheckinDate===yest?prev.streak+1:1):prev.streak,
        totalDays:isNewDay?prev.totalDays+1:prev.totalDays,
        log:isNewDay&&!wasChecked?[{date:today,type:"checkin",habits:checkedCount,xp:totalDiff,icon:"✅"}].concat(prev.log.slice(0,99)):prev.log,
      });
    });
    if(!todayHabits[hid]) spark();
  }

  function doEvent(ev){
    var total=Object.values(ev.xp).reduce(function(a,b){return a+b;},0);
    setState(function(prev){
      var nx=Object.assign({},prev.statXP);
      Object.entries(ev.xp).forEach(function(kv){nx[kv[0]]=(nx[kv[0]]||0)+kv[1];});
      return Object.assign({},prev,{statXP:nx,totalXP:prev.totalXP+total,
        log:[{date:today,type:"event",label:ev.label,icon:ev.icon,xp:total}].concat(prev.log.slice(0,99))});
    });
    spark();notify(ev.icon+" "+ev.label+" +"+total+" XP!",C.to);
  }

  function submitPaper(){
    var rt=RESEARCH_TYPES.find(function(r){return r.id===paperForm.type;});
    if(!rt||!paperForm.title)return;
    var bonus=paperForm.role==="1저자"?1:paperForm.role==="교신저자"?0.9:0.5;
    var xp=Math.round(rt.xp*bonus);
    var entry={id:Date.now(),date:today,typeId:rt.id,typeLabel:rt.label,icon:rt.icon,title:paperForm.title,journal:paperForm.journal,role:paperForm.role,projectId:paperForm.projectId,xp:xp};
    setState(function(prev){
      var nx=Object.assign({},prev.statXP,{research:(prev.statXP.research||0)+xp});
      var nprj=prev.projects.map(function(p){return p.id===paperForm.projectId?Object.assign({},p,{papers:(p.papers||[]).concat([entry])}):p;});
      return Object.assign({},prev,{statXP:nx,totalXP:prev.totalXP+xp,researchLog:[entry].concat(prev.researchLog||[]),projects:nprj,
        log:[{date:today,type:"research",label:rt.icon+" "+rt.label,icon:rt.icon,xp:xp}].concat(prev.log.slice(0,99))});
    });
    spark();notify(rt.icon+" "+rt.label+" +"+xp+" XP!",C.mok);
    setShowPaper(false);setPaperForm({type:"",title:"",journal:"",role:"1저자",projectId:""});
  }

  function savePrj(){
    if(!prjForm.title)return;
    setState(function(prev){
      if(editingPrj){return Object.assign({},prev,{projects:prev.projects.map(function(p){return p.id===editingPrj?Object.assign({},p,prjForm):p;})});}
      return Object.assign({},prev,{projects:prev.projects.concat([Object.assign({},prjForm,{id:String(Date.now()),papers:[]})])});
    });
    notify(editingPrj?"수정 완료":"프로젝트 추가!",C.mok);
    setShowProject(false);setEditingPrj(null);setPrjForm({title:"",sub:"",journal:"",status:"작성중",progress:0,deadline:"",notes:""});
  }

  function logWeight(){
    var w=parseFloat(weightInput);
    if(isNaN(w)||w<30||w>150)return;
    setState(function(prev){return Object.assign({},prev,{
      weightLog:(prev.weightLog||[]).concat([{date:today,weight:w}]).slice(-60),
      log:[{date:today,type:"weight",weight:w,icon:"⚖️",xp:0}].concat(prev.log.slice(0,99)),
    });});
    notify("체중 기록: "+w+"kg",C.mok3);setWeightInput("");setShowWeight(false);
  }

  function wZone(w){
    if(w>W.z1)return{label:"과체중",color:C.hwa,emoji:"🔴"};
    if(w>W.z2)return{label:"주의",color:C.to,emoji:"🟡"};
    if(w>W.z3)return{label:"정상",color:C.mok3,emoji:"🟢"};
    return{label:"이상",color:C.mok,emoji:"⭐"};
  }
  var zone=wZone(latestW);
  var dds=daysUntil(settings.dDayShort.date);
  var ddl=daysUntil(settings.dDayLong.date);

  var TABS=[
    {id:"main",icon:"📊",label:"스탯"},
    {id:"research",icon:"📚",label:"연구"},
    {id:"events",icon:"📌",label:"실적"},
    {id:"body",icon:"💎",label:"체중"},
    {id:"settings",icon:"⚙️",label:"설정"},
    {id:"log",icon:"📋",label:"로그"},
  ];

  var S={
    root:{minHeight:"100vh",background:C.su,fontFamily:"'Noto Sans KR',sans-serif",color:C.geum,position:"relative",overflowX:"hidden"},
    bg:{position:"fixed",inset:0,background:"radial-gradient(ellipse at 25% 0%,"+C.mok+"09,"+C.su+" 55%)",zIndex:0},
    grid:{position:"fixed",inset:0,zIndex:0,backgroundImage:"linear-gradient("+C.mok+"09 1px,transparent 1px),linear-gradient(90deg,"+C.mok+"09 1px,transparent 1px)",backgroundSize:"36px 36px"},
    wrap:{position:"relative",zIndex:1,maxWidth:600,margin:"0 auto",padding:"18px 14px 100px"},
    header:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16,borderBottom:"1px solid "+C.mok+"1a",paddingBottom:14},
    name:{fontFamily:"'Share Tech Mono',monospace",fontSize:"1.4rem",fontWeight:900,color:C.geum,letterSpacing:2},
    lv:{fontFamily:"'Share Tech Mono',monospace",background:"linear-gradient(135deg,"+C.mok2+","+C.mok3+")",color:C.su,padding:"3px 12px",borderRadius:20,fontSize:"0.85rem",fontWeight:900,animation:"glow 2.5s infinite"},
    ddRow:{display:"flex",gap:7,marginBottom:16},
    ddBox:{flex:1,background:C.su2,border:"1px solid "+C.mok+"1a",borderRadius:10,padding:"9px 6px",display:"flex",flexDirection:"column",alignItems:"center",gap:2},
    tabs:{display:"flex",gap:3,marginBottom:16},
    tab:{flex:1,padding:"7px 2px",background:C.su2,border:"1px solid "+C.mok+"1a",borderRadius:8,color:C.geum3,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2},
    tabOn:{background:C.mok+"1a",borderColor:C.mok,color:C.mok},
    card:{background:C.su2,border:"1px solid",borderRadius:12,padding:14},
    bar:{height:5,background:"#ffffff10",borderRadius:3,overflow:"hidden"},
    fill:{height:"100%",borderRadius:3,transition:"width 0.6s ease"},
    grade:{fontFamily:"'Share Tech Mono',monospace",fontWeight:900,fontSize:"1.15rem",border:"2px solid",borderRadius:7,padding:"2px 9px"},
    logRow:{display:"flex",gap:8,alignItems:"center",padding:"8px 0",borderBottom:"1px solid "+C.mok+"0d"},
    logDate:{color:C.geum3,minWidth:80,fontFamily:"'Share Tech Mono',monospace",fontSize:"0.65rem"},
    outline:{background:"transparent",border:"1px solid "+C.mok+"77",borderRadius:10,padding:11,color:C.mok,fontSize:"0.88rem",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:6,width:"100%"},
    solid:{width:"100%",padding:13,background:"linear-gradient(135deg,"+C.mok2+","+C.mok+")",border:"none",borderRadius:12,color:C.su,fontWeight:900,fontSize:"0.95rem"},
    evBtn:{display:"flex",alignItems:"center",gap:10,background:C.su2,border:"1px solid "+C.mok+"1a",borderRadius:10,padding:"11px 13px",color:C.geum,width:"100%",marginBottom:8},
    fixBtn:{position:"fixed",bottom:22,left:"50%",transform:"translateX(-50%)",background:"linear-gradient(135deg,"+C.mok2+","+C.mok3+")",border:"none",borderRadius:30,padding:"14px 42px",color:C.su,fontWeight:900,fontSize:"0.92rem",cursor:"pointer",boxShadow:"0 0 22px "+C.mok+"44",zIndex:50,whiteSpace:"nowrap"},
    overlay:{position:"fixed",inset:0,background:"#000000e0",zIndex:150,display:"flex",alignItems:"flex-end"},
    modal:{width:"100%",maxWidth:600,margin:"0 auto",background:C.su2,borderRadius:"20px 20px 0 0",padding:"22px 18px 38px",border:"1px solid "+C.mok+"2a",maxHeight:"88vh",overflowY:"auto"},
    mTitle:{fontFamily:"'Share Tech Mono',monospace",fontWeight:900,fontSize:"1rem",color:C.mok,marginBottom:14,textAlign:"center"},
    hItem:{display:"flex",alignItems:"center",gap:10,padding:"10px 13px",borderRadius:10,border:"1px solid",cursor:"pointer",marginBottom:6},
    sBadge:{fontSize:"0.68rem",fontWeight:700,padding:"2px 8px",borderRadius:5,border:"1px solid"},
    mTag:{fontSize:"0.68rem",color:C.geum2,background:C.su3,padding:"2px 7px",borderRadius:4},
    sRow:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid "+C.mok+"11",fontSize:"0.82rem"},
  };

  return (
    <div style={S.root}>
      <div style={S.bg}/><div style={S.grid}/>
      {particles.map(function(p){return <div key={p.id} style={{position:"fixed",bottom:"30%",left:p.x+"%",width:7,height:7,borderRadius:"50%",background:C.mok,animation:"particleUp 1.4s ease-out forwards",animationDelay:p.delay+"s",zIndex:100}}/> ;})}

            <div style={{fontSize:"0.65rem",color:C.geum3,marginTop:4}}>1저자 100% · 교신저자 90% · 공동저자 50%</div>
          </div>
          <Btn onClick={submitPaper} style={Object.assign({},S.solid,{opacity:paperForm.type&&paperForm.title?1:0.4})}>등록</Btn>
        </div>
      </div>}

      {/* 프로젝트 모달 */}
      {showProject&&<div style={S.overlay} onClick={function(){setShowProject(false);}}>
        <div style={S.modal} onClick={function(e){e.stopPropagation();}}>
          <div style={S.mTitle}>{editingPrj?"✏️ 프로젝트 편집":"📚 새 연구 프로젝트"}</div>
          {[
            {lbl:"프로젝트 제목",key:"title",ph:"예: DJA 논문"},
            {lbl:"부제/설명",key:"sub",ph:"예: GenAI × 직업불안"},
            {lbl:"목표 저널",key:"journal",ph:"예: IJPR"},
          ].map(function(f){return(
            <div key={f.key} style={{marginBottom:10}}>
              <div style={{fontSize:"0.75rem",color:C.mok,fontWeight:700,marginBottom:5}}>{f.lbl}</div>
              <Inp value={prjForm[f.key]} onChange={function(e){var v=e.target.value;setPrjForm(function(p){var n=Object.assign({},p);n[f.key]=v;return n;});}} placeholder={f.ph}/>
            </div>
          );})}
          <div style={{marginBottom:10}}>
            <div style={{fontSize:"0.75rem",color:C.mok,fontWeight:700,marginBottom:5}}>상태</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {PROJECT_STATUS.map(function(s){
                var on=prjForm.status===s,sc=STATUS_COLOR[s]||C.geum2;
                return <Btn key={s} onClick={function(){setPrjForm(function(p){return Object.assign({},p,{status:s});});}}
                  style={{padding:"5px 10px",fontSize:"0.75rem",border:"1px solid "+(on?sc:"#2a3a2a"),background:on?sc+"22":"transparent",color:on?sc:C.geum2,borderRadius:6}}>{s}</Btn>;
              })}
            </div>
          </div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:"0.75rem",color:C.mok,fontWeight:700,marginBottom:5}}>진척도 ({prjForm.progress}%)</div>
            <input type="range" min="0" max="100" value={prjForm.progress}
              onChange={function(e){var v=parseInt(e.target.value);setPrjForm(function(p){return Object.assign({},p,{progress:v});});}}
              style={{width:"100%",accentColor:C.mok}}/>
          </div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:"0.75rem",color:C.mok,fontWeight:700,marginBottom:5}}>마감일</div>
            <Inp type="date" value={prjForm.deadline} onChange={function(e){var v=e.target.value;setPrjForm(function(p){return Object.assign({},p,{deadline:v});});}}/>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:"0.75rem",color:C.mok,fontWeight:700,marginBottom:5}}>메모</div>
            <Inp value={prjForm.notes} onChange={function(e){var v=e.target.value;setPrjForm(function(p){return Object.assign({},p,{notes:v});});}} placeholder="메모"/>
          </div>
          <Btn onClick={savePrj} style={Object.assign({},S.solid,{opacity:prjForm.title?1:0.4})}>{editingPrj?"수정 완료":"추가"}</Btn>
        </div>
      </div>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
